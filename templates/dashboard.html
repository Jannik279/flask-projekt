<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

h1 {
    font-size: 60px;
    margin-top: 30px;
}

.grid {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 40px;
}

.card {
    width: 250px;
    padding: 25px;
    border-radius: 15px;
    font-size: 28px;
}

.a { background: #3498db; }
.b { background: #2ecc71; }
.c { background: #e74c3c; }

.order {
    margin-top: 40px;
    font-size: 30px;
}

.qr-area {
    display: flex;
    justify-content: center;
    gap: 120px;
    margin-top: 60px;
}

.qr-box {
    padding: 20px;
    border: 3px solid white;
    border-radius: 15px;
}
</style>
</head>

<body>

<h1>📊 Dashboard</h1>

<div class="grid">
    <div class="card a">iPad 1: <span id="a1">-</span></div>
    <div class="card b">iPad 2: <span id="a2">-</span></div>
    <div class="card c">iPad 3: <span id="a3">-</span></div>
</div>

<div class="order">
    <h2>🏁 Reihenfolge</h2>
    <p id="order"></p>
</div>

<button onclick="reset()">🔄 Neue Runde</button>

<h2>QR Codes</h2>

<div class="qr-area">

    <div class="qr-box">
        <p>iPad 1</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data={{ request.url_root }}submit/1">
    </div>

    <div class="qr-box">
        <p>iPad 2</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data={{ request.url_root }}submit/2">
    </div>

    <div class="qr-box">
        <p>iPad 3</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data={{ request.url_root }}submit/3">
    </div>

</div>

<script>
async function load() {
    let res = await fetch("/state");
    let data = await res.json();

    let a = data.answers;

    document.getElementById("a1").innerText = a["1"]?.answer || "-";
    document.getElementById("a2").innerText = a["2"]?.answer || "-";
    document.getElementById("a3").innerText = a["3"]?.answer || "-";

    let orderText = "";
    data.order.forEach((ipad, index) => {
        orderText += (index+1) + ". iPad " + ipad + " ";
    });

    document.getElementById("order").innerText = orderText || "-";
}

async function reset() {
    await fetch("/reset", {method: "POST"});
    load();
}

setInterval(load, 1000);
load();
</script>

</body>
</html>
