<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    margin: 0;
}

h1 {
    font-size: 45px;
    margin-top: 20px;
}

.grid {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 30px;
}

.card {
    width: 200px;
    padding: 18px;
    border-radius: 12px;
    font-size: 22px;
}

.a { background: #3498db; }
.b { background: #2ecc71; }
.c { background: #e74c3c; }

/* RESET BUTTON */
.reset-btn {
    margin-top: 25px;
    padding: 15px 30px;
    font-size: 22px;
    border: none;
    border-radius: 10px;
    background: #ff4d4d;
    color: white;
    cursor: pointer;
}

/* REIHENFOLGE */
.order {
    margin-top: 35px;
    font-size: 22px;
}

.order-item {
    margin: 8px;
    font-size: 20px;
}

/* QR */
.qr-area {
    display: flex;
    justify-content: center;
    gap: 80px;
    margin-top: 40px;
}

.qr-box {
    padding: 15px;
    border: 2px solid white;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>📊 Dashboard</h1>

<div class="grid">
    <div class="card a">iPad 1: <span id="a1">-</span></div>
    <div class="card b">iPad 2: <span id="a2">-</span></div>
    <div class="card c">iPad 3: <span id="a3">-</span></div>
</div>

<button class="reset-btn" onclick="reset()">🔄 Neue Runde starten</button>

<div class="order">
    <h2>🏁 Reihenfolge</h2>
    <div id="order"></div>
</div>

<h2>QR Codes</h2>

<div class="qr-area">

    <div class="qr-box">
        <p>iPad 1</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data={{ request.url_root }}submit/1">
    </div>

    <div class="qr-box">
        <p>iPad 2</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data={{ request.url_root }}submit/2">
    </div>

    <div class="qr-box">
        <p>iPad 3</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data={{ request.url_root }}submit/3">
    </div>

</div>

<script>
async function load() {
    let res = await fetch("/state");
    let data = await res.json();

    let a = data.answers;

    document.getElementById("a1").innerText = a["1"]?.answer || "-";
    document.getElementById("a2").innerText = a["2"]?.answer || "-";
    document.getElementById("a3").innerText = a["3"]?.answer || "-";

    let html = "";
    data.order.forEach((ipad, i) => {
        html += `<div class="order-item">${i+1}. iPad ${ipad}</div>`;
    });

    document.getElementById("order").innerHTML = html || "-";
}

async function reset() {
    await fetch("/reset", {method: "POST"});
    load();
}

setInterval(load, 1000);
load();
</script>

</body>
</html>
