<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<title>Antwort senden</title>

<style>

body{
    font-family:Arial;
    text-align:center;
    background:#f4f4f4;
    margin-top:50px;
}

.box{
    background:white;
    width:80%;
    max-width:700px;
    margin:auto;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

textarea{
    width:100%;
    height:200px;
    font-size:22px;
}

button{
    margin-top:20px;
    padding:15px 40px;
    font-size:20px;
    cursor:pointer;
}

#status{
    margin-top:20px;
    color:green;
    font-size:22px;
}

</style>

</head>

<body>

<div class="box">

<h1>iPad {{ ipad }}</h1>

<p>Antwort eingeben:</p>

<textarea id="text"></textarea>

<br>

<button onclick="sendAnswer()">
Antwort senden
</button>

<div id="status"></div>

</div>

<script>

async function sendAnswer(){

    const text =
        document.getElementById("text").value;

    await fetch("/save",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            ipad:"{{ ipad }}",

            text:text

        })

    });

    document.getElementById("status").innerHTML =
        "✓ Antwort erfolgreich gesendet";
}

</script>

</body>

</html>
