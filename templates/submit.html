<h1>iPad {{ ipad }}</h1>

<button onclick="send('A')">A</button>
<button onclick="send('B')">B</button>
<button onclick="send('C')">C</button>

<script>
function send(answer) {
    fetch("/save", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            ipad: "{{ ipad }}",
            answer: answer
        })
    })
}
</script>
