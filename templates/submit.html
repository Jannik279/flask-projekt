<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>iPad {{ ipad }}</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    text-align: center;
}

h1 {
    margin-top: 40px;
}

.container {
    margin-top: 50px;
}

button {
    width: 200px;
    height: 120px;
    font-size: 40px;
    margin: 15px;
    border: none;
    border-radius: 15px;
    color: white;
}

.a { background: #3498db; }
.b { background: #2ecc71; }
.c { background: #e74c3c; }

button:active {
    transform: scale(0.95);
}
</style>
</head>

<body>

<h1>iPad {{ ipad }}</h1>
<p>Wähle deine Antwort</p>

<div class="container">
    <button class="a" onclick="send('A')">A</button>
    <button class="b" onclick="send('B')">B</button>
    <button class="c" onclick="send('C')">C</button>
</div>

<script>
function send(answer) {
    fetch("/save", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            ipad: "{{ ipad }}",
            answer: answer
        })
    })
}
</script>

</body>
</html>
